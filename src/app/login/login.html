v class="container mt-5">
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4>🔐 Connexion</h4>
            </div>
            <div class="card-body">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input [(ngModel)]="email" type="email" class="form-control" placeholder="admin@shop.com">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input [(ngModel)]="password" type="password" class="form-control">
                </div>
                <button (click)="login()" class="btn btn-primary w-100">
                    Se connecter
                </button>
                <p *ngIf="error" class="text-danger mt-2">{{ error }}</p>
            </div>
        </div>
    </div>
</div>
</div>
